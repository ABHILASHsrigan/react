<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Todo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-4">
        <header class="text-center mb-4">
            <h1 class="display-4">Task Manager</h1>
            <h2 class="text-muted">My Todo List</h2>
        </header>

        <!-- Summary Cards -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">TOTAL</h5>
                        <h2 class="text-primary" id="totalCount">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">PENDING</h5>
                        <h2 class="text-warning" id="pendingCount">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">DONE</h5>
                        <h2 class="text-success" id="doneCount">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search and New Task Button -->
        <div class="row mb-4">
            <div class="col-md-8">
                <input type="text" class="form-control" id="searchInput" placeholder="Search tasks...">
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#taskModal">
                    <i class="fas fa-plus"></i> New Task
                </button>
            </div>
        </div>

        <!-- Tasks Table -->
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>TASK</th>
                        <th>USERNAME</th>
                        <th>DATE</th>
                        <th>TYPE</th>
                        <th>STATUS</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <!-- Tasks will be populated here -->
                </tbody>
            </table>
        </div>

        <!-- Pagination Controls -->
        <nav aria-label="Tasks pagination" class="mt-4">
            <div class="d-flex justify-content-between align-items-center">
                <div class="text-muted">
                    Showing <span id="startRecord">1</span> to <span id="endRecord">5</span> of <span id="totalRecords">0</span> entries
                </div>
                <ul class="pagination mb-0" id="paginationControls">
                    <!-- Pagination buttons will be populated here -->
                </ul>
            </div>
        </nav>
    </div>

    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <input type="hidden" id="taskId">
                        
                        <div class="mb-3">
                            <label for="task" class="form-label">Task *</label>
                            <textarea class="form-control" id="task" rows="3" required></textarea>
                            <div class="invalid-feedback">Task must be at least 3 characters long.</div>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username *</label>
                            <input type="text" class="form-control" id="username" required>
                            <div class="invalid-feedback">Username cannot be blank.</div>
                        </div>

                        <div class="mb-3">
                            <label for="date" class="form-label">Date *</label>
                            <input type="text" class="form-control" id="date" placeholder="YYYYMMDD" required>
                            <div class="invalid-feedback">Date must contain only numbers (YYYYMMDD format).</div>
                        </div>

                        <div class="mb-3">
                            <label for="task_type" class="form-label">Task Type *</label>
                            <select class="form-select" id="task_type" required>
                                <option value="">Select Task Type</option>
                                <option value="Office">Office</option>
                                <option value="Personal">Personal</option>
                                <option value="Family">Family</option>
                                <option value="Friends">Friends</option>
                                <option value="Other">Other</option>
                            </select>
                            <div class="invalid-feedback">Please select a task type.</div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="status">
                                <label class="form-check-label" for="status">
                                    Mark as Completed
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveTaskBtn">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://kit.fontawesome.com/your-kit-code.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
